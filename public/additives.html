<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>التحقق من المضافات الغذائية — FoodCheck Jordan</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0d1f35;--navy2:#152b47;--navy3:#1a3558;
  --teal:#00d4a8;--teal2:#00b891;
  --pass-bg:#071f14;--pass-border:#00d4a8;--pass-color:#00d4a8;
  --fail-bg:#1e0808;--fail-border:#a32d2d;--fail-color:#f09595;
  --cond-bg:#1a1000;--cond-border:#ba7517;--cond-color:#ef9f27;
  --text:#e8edf2;--text2:#9ab0c8;--text3:#5a7a98;
  --border:#ffffff12;--border2:#ffffff20;
}
body{font-family:'Tajawal',sans-serif;background:var(--navy);color:var(--text);min-height:100vh;direction:rtl}

/* ── HEADER ── */
.pg-header{padding:1rem 1.5rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--navy2)}
.pg-logo{display:flex;align-items:center;gap:8px;text-decoration:none}
.logo-dot{width:8px;height:8px;border-radius:50%;background:var(--teal);box-shadow:0 0 8px var(--teal)}
.pg-logo-text{font-size:15px;font-weight:700;color:var(--text)}
.pg-logo-text span{color:var(--teal)}
.pg-back{font-size:12px;color:var(--text3);text-decoration:none;border:1px solid var(--border2);padding:4px 12px;border-radius:99px;transition:all .2s}
.pg-back:hover{color:var(--teal);border-color:var(--teal)}

/* ── HERO ── */
.pg-hero{padding:1.5rem 1.5rem 1rem;border-bottom:1px solid var(--border)}
.pg-title{font-size:18px;font-weight:700;margin-bottom:4px}
.pg-sub{font-size:13px;color:var(--text2);line-height:1.6}
.method-pills{display:flex;flex-wrap:wrap;gap:6px;margin-top:.75rem;align-items:center;font-size:12px;color:var(--text3)}
.mp{padding:2px 10px;border-radius:99px;font-size:11px;font-weight:700}
.mp1{background:#185FA520;color:#85b7eb;border:1px solid #185FA540}
.mp2{background:#1D9E7520;color:#5dcaa5;border:1px solid #1D9E7540}
.mp3{background:#ba751720;color:#ef9f27;border:1px solid #ba751740}
.arrow{font-size:10px;color:var(--text3)}

/* ── SEARCH AREA ── */
.search-wrap{padding:1.25rem 1.5rem;background:var(--navy2);border-bottom:1px solid var(--border)}
.search-row{display:flex;gap:8px;margin-bottom:10px}
.s-input{flex:1;height:44px;padding:0 14px;border-radius:8px;border:1px solid var(--border2);background:var(--navy3);color:var(--text);font-size:14px;font-family:'Tajawal',sans-serif;outline:none;transition:border .2s}
.s-input:focus{border-color:var(--teal)}
.s-input::placeholder{color:var(--text3)}
.s-clear{height:44px;padding:0 14px;border-radius:8px;border:1px solid var(--border2);background:transparent;color:var(--text2);font-size:13px;cursor:pointer;font-family:'Tajawal',sans-serif;transition:all .2s;white-space:nowrap}
.s-clear:hover{background:var(--navy3)}

/* Autocomplete */
.autocomplete-wrap{position:relative;flex:1}
.autocomplete-list{position:absolute;top:48px;right:0;left:0;background:var(--navy2);border:1px solid var(--border2);border-radius:8px;max-height:220px;overflow-y:auto;z-index:100;display:none}
.ac-item{padding:8px 14px;font-size:13px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .15s;display:flex;align-items:center;gap:8px}
.ac-item:last-child{border-bottom:none}
.ac-item:hover{background:var(--navy3)}
.ac-ins{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--teal);flex-shrink:0;width:40px}
.ac-name{color:var(--text)}
.ac-class{font-size:11px;color:var(--text3);margin-right:auto}

/* Category select */
.cat-row{display:flex;gap:8px;align-items:center}
.cat-select{flex:1;height:44px;padding:0 12px;border-radius:8px;border:1px solid var(--border2);background:var(--navy3);color:var(--text);font-size:13px;font-family:'Tajawal',sans-serif;outline:none;transition:border .2s}
.cat-select:focus{border-color:var(--teal)}
.btn-check{height:44px;padding:0 24px;border-radius:8px;background:var(--teal);border:none;color:var(--navy);font-size:14px;font-weight:700;cursor:pointer;font-family:'Tajawal',sans-serif;transition:all .2s;white-space:nowrap}
.btn-check:hover{background:var(--teal2)}
.btn-check:disabled{opacity:.5;cursor:not-allowed}

/* ── RESULTS ── */
.results-wrap{padding:1.25rem 1.5rem}

/* VERDICT CARD */
.verdict-card{border-radius:12px;padding:1.25rem;margin-bottom:1rem;border:1.5px solid}
.verdict-card.PASS{background:var(--pass-bg);border-color:var(--pass-border)}
.verdict-card.FAIL{background:var(--fail-bg);border-color:var(--fail-border)}
.verdict-card.CONDITIONAL{background:var(--cond-bg);border-color:var(--cond-border)}
.verdict-card.NOT_FOUND{background:#111827;border-color:var(--border2)}

.vc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:12px}
.vc-name{font-size:16px;font-weight:700;color:var(--text)}
.vc-ins{font-size:12px;color:var(--text3);font-family:'IBM Plex Mono',monospace;margin-top:3px}
.vc-badge{padding:5px 16px;border-radius:99px;font-size:13px;font-weight:700;white-space:nowrap;flex-shrink:0}
.badge-PASS{background:#00d4a820;color:var(--pass-color);border:1px solid #00d4a840}
.badge-FAIL{background:#a32d2d20;color:var(--fail-color);border:1px solid #a32d2d40}
.badge-CONDITIONAL{background:#ba751720;color:var(--cond-color);border:1px solid #ba751740}
.badge-NOT_FOUND{background:#ffffff10;color:var(--text2);border:1px solid var(--border2)}

.vc-message{font-size:13px;color:var(--text2);margin-bottom:12px;padding:.625rem .875rem;background:#ffffff06;border-radius:8px;line-height:1.6}

.vc-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}
@media(max-width:500px){.vc-grid{grid-template-columns:1fr 1fr}}
.vc-box{background:#ffffff08;border-radius:8px;padding:8px 10px}
.vc-label{font-size:11px;color:var(--text3);margin-bottom:3px}
.vc-val{font-size:13px;font-weight:500;color:var(--text)}
.vc-val.green{color:var(--teal)}
.vc-val.amber{color:#ef9f27}
.vc-val.red{color:#f09595}

/* Steps trail */
.steps-trail{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.st{font-size:11px;padding:3px 9px;border-radius:4px;font-family:'IBM Plex Mono',monospace;font-weight:500}
.st-pass{background:#00d4a820;color:var(--teal);border:1px solid #00d4a840}
.st-fail{background:#a32d2d20;color:#f09595;border:1px solid #a32d2d40}
.st-skip{background:#ffffff08;color:var(--text3);border:1px solid var(--border)}
.st-warn{background:#ba751720;color:#ef9f27;border:1px solid #ba751740}

/* Notes */
.notes-section{margin-top:10px}
.notes-title{font-size:11px;color:var(--text3);margin-bottom:6px;font-weight:500}
.note-item{font-size:12px;color:var(--text2);padding:5px 10px;background:#ffffff06;border-radius:6px;margin-bottom:4px;border-right:2px solid var(--cond-border);line-height:1.5}
.note-id{font-family:'IBM Plex Mono',monospace;color:var(--cond-color);font-size:11px;margin-left:6px}

/* Loading */
.loading{text-align:center;padding:2rem;color:var(--text3);font-size:14px}
.loading-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--teal);animation:ld .8s infinite alternate;margin:0 3px}
.loading-dot:nth-child(2){animation-delay:.2s}
.loading-dot:nth-child(3){animation-delay:.4s}
@keyframes ld{to{opacity:.2;transform:scale(.7)}}

/* Empty */
.empty-state{text-align:center;padding:3rem 1rem;color:var(--text3)}
.empty-icon{font-size:36px;margin-bottom:.75rem;opacity:.3}

/* History */
.history-section{margin-top:.75rem}
.history-title{font-size:12px;color:var(--text3);margin-bottom:.5rem}
.history-tags{display:flex;flex-wrap:wrap;gap:6px}
.h-tag{font-size:12px;padding:3px 10px;border-radius:99px;border:1px solid var(--border2);color:var(--text2);cursor:pointer;font-family:'Tajawal',sans-serif;transition:all .2s}
.h-tag:hover{border-color:var(--teal);color:var(--teal)}

/* Disclaimer */
.disclaimer{margin-bottom:1rem;padding:.75rem 1rem;background:#ba751710;border:1px solid #ba751730;border-radius:8px;font-size:12px;color:var(--text2);line-height:1.6}
.disclaimer strong{color:#ef9f27}
</style>
</head>
<body>

<div class="pg-header">
  <a class="pg-logo" href="/">
    <div class="logo-dot"></div>
    <span class="pg-logo-text">FoodCheck <span>Jordan</span></span>
  </a>
  <a class="pg-back" href="/">→ الرئيسية</a>
</div>

<div class="pg-hero">
  <div class="pg-title">🧪 التحقق من المضافات الغذائية</div>
  <div class="pg-sub">نتيجة قطعية: مسموح / ممنوع / مشروط — مستمدة من قاعدة بيانات Codex CXS 192:2025</div>
  <div class="method-pills">
    <span>منهجية البحث:</span>
    <span class="mp mp1">① Table 1 — مسموح في هذه الفئة؟</span>
    <span class="arrow">←</span>
    <span class="mp mp2">② Table 2 — الحد الأقصى</span>
    <span class="arrow">←</span>
    <span class="mp mp3">③ Table 3 + Annex 3</span>
  </div>
</div>

<div class="search-wrap">
  <div class="search-row">
    <div class="autocomplete-wrap">
      <input class="s-input" id="ins-input" type="text"
        placeholder="ابحث: رقم INS أو اسم المضاف... مثال: 211 أو benzoate"
        oninput="onInsInput()" autocomplete="off">
      <div class="autocomplete-list" id="ac-list"></div>
    </div>
    <button class="s-clear" onclick="clearAll()">مسح</button>
  </div>
  <div class="cat-row">
    <select class="cat-select" id="cat-select">
      <option value="">— اختر فئة المنتج الغذائي —</option>
    </select>
    <button class="btn-check" id="btn-check" onclick="doCheck()">تحقق</button>
  </div>
  <div class="history-section" id="history-section" style="display:none">
    <div class="history-title">بحوث سابقة:</div>
    <div class="history-tags" id="history-tags"></div>
  </div>
</div>

<div class="results-wrap" id="results-wrap">
  <div class="empty-state">
    <div class="empty-icon">🔬</div>
    <div>أدخل رقم INS أو اسم المضاف واختر فئة المنتج</div>
  </div>
</div>

<script>
var selectedIns = null;
var selectedInsName = '';
var searchTimeout = null;
var history_ = [];

// ── Load categories ──
async function loadCategories() {
  try {
    const r = await fetch('/api/additives/categories');
    const cats = await r.json();
    const sel = document.getElementById('cat-select');
    // Group by parent
    cats.forEach(function(c) {
      const opt = document.createElement('option');
      opt.value = c.cat_no;
      const indent = (c.cat_no.split('.').length - 1);
      opt.textContent = '\u00A0'.repeat(indent * 2) + c.cat_no + ' — ' + c.cat_name;
      sel.appendChild(opt);
    });
  } catch(e) {
    console.error('Categories load error:', e);
  }
}

// ── Autocomplete ──
async function onInsInput() {
  const q = document.getElementById('ins-input').value.trim();
  selectedIns = null;
  clearTimeout(searchTimeout);
  if (q.length < 2) { hideAC(); return; }
  searchTimeout = setTimeout(async function() {
    try {
      const r = await fetch('/api/additives/search?q=' + encodeURIComponent(q));
      const items = await r.json();
      showAC(items);
    } catch(e) { hideAC(); }
  }, 250);
}

function showAC(items) {
  const list = document.getElementById('ac-list');
  if (!items || !items.length) { hideAC(); return; }
  list.innerHTML = items.map(function(it) {
    return '<div class="ac-item" onclick="selectIns(\'' + it.ins + '\',\'' + escHtml(it.name) + '\')">'
      + '<span class="ac-ins">' + it.ins + '</span>'
      + '<span class="ac-name">' + escHtml(it.name) + '</span>'
      + '<span class="ac-class">' + (it.functional_class || '') + '</span>'
      + '</div>';
  }).join('');
  list.style.display = 'block';
}

function hideAC() {
  document.getElementById('ac-list').style.display = 'none';
}

function selectIns(ins, name) {
  selectedIns = ins;
  selectedInsName = name;
  document.getElementById('ins-input').value = ins + ' — ' + name;
  hideAC();
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Check ──
async function doCheck() {
  const insVal = document.getElementById('ins-input').value.trim();
  const catVal = document.getElementById('cat-select').value;

  if (!insVal) { alert('يرجى إدخال رقم INS أو اسم المضاف'); return; }
  if (!catVal) { alert('يرجى اختيار فئة المنتج الغذائي'); return; }

  // Extract INS number
  const ins = selectedIns || insVal.split(/[\s—-]/)[0].trim();

  document.getElementById('results-wrap').innerHTML = '<div class="loading">'
    + '<span class="loading-dot"></span><span class="loading-dot"></span><span class="loading-dot"></span>'
    + '<div style="margin-top:.5rem">جاري التحقق...</div></div>';

  try {
    const r = await fetch('/api/additives/check?ins=' + encodeURIComponent(ins) + '&cat=' + encodeURIComponent(catVal));
    const data = await r.json();
    renderResult(data, catVal);
    addHistory(ins, data.additive_name || ins, catVal);
  } catch(e) {
    document.getElementById('results-wrap').innerHTML =
      '<div class="empty-state"><div class="empty-icon">⚠️</div><div>خطأ في الاتصال بقاعدة البيانات</div></div>';
  }
}

function renderResult(d, catVal) {
  var v = d.verdict || 'NOT_FOUND';
  var vLabel = {PASS:'✓ مسموح', FAIL:'✗ غير مسموح', CONDITIONAL:'⚠ مشروط', NOT_FOUND:'غير موجود'}[v] || v;
  var vLabelEn = {PASS:'Permitted', FAIL:'Not Permitted', CONDITIONAL:'Conditional', NOT_FOUND:'Not Found'}[v] || v;

  // Steps trail
  var steps = d.steps || {};
  var stepsHtml = '';
  if (steps.table1) stepsHtml += '<span class="st st-pass">✓ Table 1 — مدرج</span>';
  else stepsHtml += '<span class="st st-fail">✗ Table 1 — غير مدرج</span>';
  if (steps.table2) stepsHtml += '<span class="st st-pass">✓ Table 2 — مدرج</span>';
  else stepsHtml += '<span class="st st-skip">— Table 2</span>';
  if (steps.table3) stepsHtml += '<span class="st st-warn">⚠ Table 3 — قيود</span>';
  else stepsHtml += '<span class="st st-pass">✓ Table 3 — لا قيود</span>';
  if (steps.annex3) stepsHtml += '<span class="st st-warn">⚠ Annex 3 — مستثناة</span>';
  else stepsHtml += '<span class="st st-pass">✓ Annex 3 — لا استثناء</span>';

  // Notes
  var notesHtml = '';
  if (d.notes_text && d.notes_text.length) {
    notesHtml = '<div class="notes-section"><div class="notes-title">الملاحظات:</div>'
      + d.notes_text.map(function(n) {
          return '<div class="note-item"><span class="note-id">#' + n.id + '</span>' + escHtml(n.text) + '</div>';
        }).join('') + '</div>';
  }

  // Table 3 details
  var t3Html = '';
  if (steps.table3) {
    t3Html = '<div class="vc-box" style="grid-column:1/-1"><div class="vc-label">شروط Table 3</div>'
      + '<div class="vc-val amber" style="font-size:12px">' + escHtml(steps.table3.specific_allowance || steps.table3.max_level || 'GMP') + '</div></div>';
  }

  var catName = document.getElementById('cat-select').selectedOptions[0]?.textContent || catVal;

  var html = '<div class="disclaimer"><strong>تنبيه:</strong> هذه النتيجة مستمدة من Codex CXS 192:2025. التطبيق في الأردن يخضع للتشريعات الأردنية. للتأكد راجع مختص سلامة غذاء.</div>'
    + '<div class="verdict-card ' + v + '">'
    + '<div class="vc-top">'
    + '<div><div class="vc-name">' + escHtml(d.additive_name || 'INS ' + d.ins) + '</div>'
    + '<div class="vc-ins">INS ' + d.ins + (d.functional_class ? ' — ' + d.functional_class : '') + '</div></div>'
    + '<div class="vc-badge badge-' + v + '">' + vLabel + '</div>'
    + '</div>'
    + '<div class="vc-message">' + escHtml(d.message_ar || '') + '</div>'
    + '<div class="vc-grid">'
    + '<div class="vc-box"><div class="vc-label">الفئة الغذائية</div><div class="vc-val">' + escHtml(catVal) + '</div></div>'
    + '<div class="vc-box"><div class="vc-label">الحد الأقصى</div><div class="vc-val ' + (v==='FAIL'?'red':'green') + '">' + escHtml(d.max_level || '—') + '</div></div>'
    + '<div class="vc-box"><div class="vc-label">المرجع</div><div class="vc-val">CXS 192:2025</div></div>'
    + t3Html
    + '</div>'
    + '<div class="steps-trail">' + stepsHtml + '</div>'
    + notesHtml
    + '</div>';

  document.getElementById('results-wrap').innerHTML = html;
}

// ── History ──
function addHistory(ins, name, cat) {
  history_.unshift({ ins, name, cat });
  if (history_.length > 6) history_ = history_.slice(0, 6);
  renderHistory();
}

function renderHistory() {
  var sec = document.getElementById('history-section');
  var tags = document.getElementById('history-tags');
  if (!history_.length) { sec.style.display='none'; return; }
  sec.style.display='block';
  tags.innerHTML = history_.map(function(h, i) {
    return '<span class="h-tag" onclick="replayHistory(' + i + ')">INS ' + h.ins + '</span>';
  }).join('');
}

function replayHistory(i) {
  var h = history_[i];
  document.getElementById('ins-input').value = h.ins + ' — ' + h.name;
  selectedIns = h.ins;
  document.getElementById('cat-select').value = h.cat;
  doCheck();
}

function clearAll() {
  document.getElementById('ins-input').value = '';
  document.getElementById('cat-select').value = '';
  selectedIns = null;
  hideAC();
  document.getElementById('results-wrap').innerHTML =
    '<div class="empty-state"><div class="empty-icon">🔬</div><div>أدخل رقم INS أو اسم المضاف واختر فئة المنتج</div></div>';
}

// Close autocomplete on outside click
document.addEventListener('click', function(e) {
  if (!e.target.closest('.autocomplete-wrap')) hideAC();
});

// Enter key
document.getElementById('ins-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') { hideAC(); doCheck(); }
});

// Init
loadCategories();
</script>
</body>
</html>
