<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | FoodCheck Jordan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0e1a;
  --surface: #111827;
  --surface2: #1a2235;
  --border: #1e2d47;
  --accent: #00d4a8;
  --accent2: #0099cc;
  --text: #e8edf5;
  --text2: #8899bb;
  --font: 'Tajawal', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  min-height: 100vh;
  font-family: var(--font);
  background:
    radial-gradient(ellipse 70% 50% at 50% -10%, rgba(0,212,168,.14) 0%, transparent 70%),
    var(--bg);
  color: var(--text);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 2rem;
}
.login-card {
  width: min(100%, 440px);
  background: rgba(17,24,39,.92);
  border: 1px solid var(--border);
  border-radius: 24px;
  box-shadow: 0 24px 80px rgba(0,0,0,.32);
  padding: 2rem;
  text-align: center;
}
.logo {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  color: var(--accent);
  font-size: 1.1rem;
  font-weight: 800;
  margin-bottom: 1.5rem;
}
.logo-dot {
  width: 8px;
  height: 8px;
  background: var(--accent);
  border-radius: 50%;
}
.logo span { color: var(--text); font-weight: 300; }
.badge {
  display: inline-flex;
  border: 1px solid rgba(0,212,168,.35);
  background: rgba(0,212,168,.08);
  color: var(--accent);
  border-radius: 100px;
  padding: 6px 14px;
  font-size: .8rem;
  font-weight: 700;
  margin-bottom: 1rem;
}
h1 {
  font-size: clamp(1.9rem, 7vw, 2.5rem);
  line-height: 1.15;
  margin-bottom: .75rem;
}
p {
  color: var(--text2);
  line-height: 1.7;
  margin-bottom: 1.5rem;
}
.actions {
  display: flex;
  gap: .75rem;
  flex-wrap: wrap;
  justify-content: center;
}
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 42px;
  padding: 10px 18px;
  border-radius: 12px;
  font-weight: 800;
  text-decoration: none;
  transition: all .2s;
}
.btn-primary {
  background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
  color: #06121f;
  box-shadow: 0 10px 28px rgba(0,212,168,.22);
}
.btn-primary:hover { color: #fff; transform: translateY(-2px); }
.btn-secondary {
  border: 1px solid var(--border);
  color: var(--text);
  background: var(--surface2);
}
.btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
@media (max-width: 480px) {
  body { padding: 1rem; }
  .login-card { padding: 1.5rem; border-radius: 18px; }
  .actions { flex-direction: column; }
  .btn { width: 100%; }
}
</style>
</head>
<body>
  <main class="login-card">
    <div class="logo">
      <div class="logo-dot"></div>
      FoodCheck <span>Jordan</span>
    </div>
    <div class="badge">Login</div>
    <h1>Login is coming soon</h1>
    <p>This page is a placeholder for the FoodCheck account login experience.</p>
    <div class="actions">
      <a class="btn btn-primary" href="/">Back to homepage</a>
      <a class="btn btn-secondary" href="/#tool">Start an audit</a>
    </div>
  </main>
</body>
</html>
